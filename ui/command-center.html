<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Searcher X</title>
  <link rel="stylesheet" href="./command-center.css">
</head>
<body>
  <main class="wrap" aria-label="Searcher X">
    <header class="topbar">
      <button id="go-home-title" class="brand brand-home" type="button" aria-label="Go to home menu">
        <img src="../images/16.png" alt="" class="brand-icon">
        <h1>Searcher X</h1>
      </button>
      <div class="top-actions">
        <button id="go-list-view" class="ghost icon-btn logo-nav-btn" type="button" aria-label="Show search engine list" title="List">
          <img src="../images/16.png" alt="" class="icon-btn-logo">
        </button>
        <button id="open-google-any" class="ghost icon-btn icon-btn-text" type="button" aria-label="Open Google plus any platform" title="Google + Any Platform">G+</button>
        <button id="start-edit" class="ghost icon-btn" type="button" aria-label="Edit engines and headers" title="Edit">&#9998;</button>
        <button id="open-settings" class="ghost icon-btn" type="button" aria-label="Open settings" title="Settings">&#9881;</button>
        <button id="toggle-theme" class="ghost icon-btn theme-toggle-btn" type="button" aria-label="Toggle dark mode" title="Enable dark mode">&#9789;</button>
      </div>
    </header>

    <section id="menu-view" class="page-view">
      <section class="query-row">
        <div class="query-input-wrap">
          <input id="query-input" type="text" placeholder="Type your search query">
          <button id="clear-query" class="query-clear" type="button" aria-label="Clear search query" hidden>x</button>
        </div>
        <button id="google-any-search-quick" class="primary query-quick-btn" type="button" aria-label="Search with Google plus any platform">Google+ Search</button>
      </section>

      <section class="engine-panel">
        <div id="engine-columns" class="engine-columns" aria-live="polite"></div>
      </section>
    </section>

    <section id="settings-view" class="page-view" hidden>
      <section class="engine-panel settings-panel">
        <h2>Settings</h2>
        <div class="settings-grid">
          <label class="setting-row" for="setting-open-background">
            <span class="setting-inline">
              <span>Open searches in background</span>
              <span class="engine-switch setting-switch">
                <input id="setting-open-background" class="engine-toggle-input" type="checkbox">
                <span class="engine-toggle"></span>
              </span>
            </span>
          </label>
          <label class="setting-row" for="setting-open-next">
            <span class="setting-inline">
              <span>Open next to current tab</span>
              <span class="engine-switch setting-switch">
                <input id="setting-open-next" class="engine-toggle-input" type="checkbox">
                <span class="engine-toggle"></span>
              </span>
            </span>
          </label>
        </div>
        <div class="settings-actions">
          <button id="export-engine-list" class="ghost" type="button">Export Engine List</button>
          <button id="import-engine-list" class="ghost" type="button">Import Engine List</button>
          <input id="import-engine-file" type="file" accept="application/json,.json" hidden>
          <button id="open-shortcuts" class="ghost" type="button">Keyboard Shortcuts for Chrome Tabs</button>
          <button id="reset-defaults-settings" class="ghost" type="button">Reset Search Engines to Default</button>
        </div>
        <footer class="settings-footer">
          <button id="open-website" class="settings-link" type="button">Visit Website: serdarsalim.com/searcher-x</button>
        </footer>
      </section>
    </section>

    <section id="google-any-view" class="page-view" hidden>
      <section class="engine-panel google-any-panel">
        <div class="google-any-block google-any-mode-block">
          <div class="google-any-block-body">
            <div class="google-any-mode-row">
              <p class="google-any-mode-label">Build your Google Search</p>
              <div class="google-any-mode-toggle" role="radiogroup" aria-label="Google any mode">
                <label class="google-any-mode-option">
                  <input type="radio" name="google-any-mode" value="separate">
                  <span>Multi tab</span>
                </label>
                <label class="google-any-mode-option">
                  <input type="radio" name="google-any-mode" value="combined">
                  <span>One tab</span>
                </label>
              </div>
            </div>
            <p id="google-any-mode-help" class="google-any-copy"></p>
          </div>
        </div>

        <div class="google-any-block google-any-platforms-block">
          <div class="google-any-block-body">
            <label class="google-any-field-title" for="google-any-keywords-input">Keywords</label>
            <input
              id="google-any-keywords-input"
              type="text"
              placeholder="e.g. profile, hiring, founder, san francisco"
              aria-label="Keywords, comma separated"
            >
            <p class="google-any-copy">Add keywords manually, comma separated.</p>

            <label class="google-any-field-title" for="google-any-engine-search">Add more from the list</label>
            <input id="google-any-engine-search" type="text" placeholder="Search keywords">
            <p class="google-any-copy">Select multiple keywords by clicking a filter:</p>

            <div class="google-any-presets-row" role="tablist" aria-label="Google plus category presets">
              <button id="google-any-preset-social" class="ghost google-any-preset-btn" type="button">Social</button>
              <button id="google-any-preset-news" class="ghost google-any-preset-btn" type="button">News</button>
              <button id="google-any-preset-tech" class="ghost google-any-preset-btn" type="button">Tech</button>
              <button id="google-any-preset-utilities" class="ghost google-any-preset-btn" type="button">Utilities</button>
            </div>

            <div id="google-any-source-list" class="google-any-source-list"></div>

            <div class="google-any-selected-wrap">
              <span class="google-any-selected-label">Selected:</span>
              <div id="google-any-selected-list" class="google-any-selected-list"></div>
            </div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div id="add-more-modal" class="modal-backdrop" hidden>
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="add-more-title">
      <header class="modal-header">
        <h2 id="add-more-title">Adding engine to</h2>
        <button id="add-more-close" class="icon-ghost" type="button" aria-label="Close add engines dialog">&times;</button>
      </header>

      <section class="modal-section">
        <h3>Add from list</h3>
        <div class="modal-grid">
          <input id="shared-search-input" type="text" placeholder="Filter engine list">
          <div class="shared-engine-table-wrap" role="region" aria-label="Shared engine list">
            <table class="shared-engine-table">
              <thead>
                <tr>
                  <th class="shared-col-category" scope="col">Category</th>
                  <th scope="col">Name</th>
                </tr>
              </thead>
              <tbody id="shared-engine-table-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="modal-section">
        <h3>Add Manually</h3>
        <div class="modal-grid manual-grid">
          <input id="manual-engine-name" type="text" placeholder="Engine name">
          <input id="manual-engine-url" type="text" placeholder="Search URL with %s">
          <button id="add-manual-engine" class="primary" type="button" hidden>Add</button>
        </div>
      </section>
    </section>
  </div>

  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <script type="module" src="./command-center.js"></script>
</body>
</html>
