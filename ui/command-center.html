<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Booster PRO - Quick Search Settings</title>
  <link rel="stylesheet" href="./command-center.css">
</head>
<body>
  <main class="wrap" aria-label="Booster PRO Quick Search Settings">
    <header class="topbar">
      <h1>Quick Search Settings</h1>
      <button id="save-settings" class="primary" type="button">Save</button>
    </header>

    <section class="engine-panel">
      <div class="engine-columns">
        <div class="engine-col">
          <h3>AI</h3>
          <div id="ai-engines" class="engine-list"></div>
        </div>

        <div class="engine-col">
          <h3>Web</h3>
          <div id="web-engines" class="engine-list"></div>
        </div>

        <div class="engine-col">
          <h3>Knowledge + Dev</h3>
          <div id="knowledge-engines" class="engine-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./command-center.js"></script>
</body>
</html>
